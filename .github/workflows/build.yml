name: Build Jar Package

on:
  # 手动触发
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 8（兼容 tools.jar 依赖）
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      # 3. 设置编码环境变量，避免文件编码问题
      - name: Set encoding
        run: |
          echo "JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8" >> $GITHUB_ENV

      # 4. 编译打包（跳过 hcp-register 模块，避免资源文件编码错误）
      - name: Build with Maven
        run: mvn -B clean package -DskipTests -pl -hcp-register

      # 5. 上传所有生成的 Jar 包
      - name: Upload Jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: huizhi-charge-jars
          path: |
            */target/*.jar
            target/*.jar
